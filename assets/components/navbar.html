        color: #374151;
        text-decoration: none;
        padding: 8px 0;
        position: relative;
        transition: color 0.2s;
    }

    .kv-nav-link:hover, .kv-nav-link.kv-active {
        color: #0F4C81;
    }

    .kv-nav-link::after {
        content: '';
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 0;
        height: 2px;
        background: #EA580C;
        transition: width 0.2s ease;
    }

    .kv-nav-link:hover::after, .kv-nav-link.kv-active::after {
        width: 100%;
    }

    .kv-btn-signin:hover {
        background: #0F4C81 !important;
        color: white !important;
    }

    .kv-btn-join:hover {

            display: none !important;
        }
        #kv-burger {

        }

            display: block;
        }
    }
</style>

<script>
(function() {
    window.addEventListener('scroll', () => {
        const nav = document.getElementById('kv-nav');
        if (nav) {
            nav.style.boxShadow = window.scrollY > 10
                ? '0 2px 12px rgba(0,0,0,0.08)' : 'none';
        }
    });

    const burger = document.getElementById('kv-burger');
    if (burger) {
        burger.addEventListener('click', () => {
            const d = document.getElementById('kv-drawer');
            if (d) {
                const isVisible = d.style.display === 'block';
                d.style.display = isVisible ? 'none' : 'block';
            }
        });
    }

    // Active Page Detection
    const path = window.location.pathname;
    document.querySelectorAll('.kv-nav-link').forEach(link => {
        const href = link.getAttribute('href');
        const page = link.dataset.page;
        if (href === path || (page && path.includes(page))) {
            link.classList.add('kv-active');
        }
    });
})();
</script>
