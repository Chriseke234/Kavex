[build]
  publish = "/"
  functions = "netlify/functions"

[[redirects]]
  from = "/seller"
  to = "/pages/auth/seller-register.html"
  status = 301

[[redirects]]
  from = "/buyer"
  to = "/pages/auth/register-buyer.html"
  status = 301

[[redirects]]
  from = "/dashboard"
  to = "/pages/seller/dashboard.html"
  status = 302

[[redirects]]
  from = "/marketplace/*"
  to = "/pages/marketplace/products.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self' https://*.supabase.co https://*.flutterwave.com; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://*.flutterwave.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://images.unsplash.com https://*.supabase.co;"
