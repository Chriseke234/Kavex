<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password — Kavex B2B</title>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/auth-pages.css">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/js/env-inject.js"></script>
</head>
<body class="bg-light">

    <div class="container" style="max-width: 450px; padding-top: 10vh;">
        <div class="card p-3">
            <div class="text-center mb-2">
                <a href="/" class="logo"><span>Kav</span><span>ex</span></a>
                <h1 class="mt-2" style="font-size: 1.5rem;">New Password</h1>
                <p class="text-muted fs-sm">Create a strong password for your account.</p>
            </div>

            <div id="reset-status"></div>

            <form onsubmit="handleResetPassword(event)">
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" name="password" id="password" required>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm New Password</label>
                    <input type="password" name="confirm_password" id="confirm_password" required>
                </div>
                <button type="submit" class="btn btn-primary w-full mt-1">Update Password</button>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../../assets/js/supabase-client.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/recovery.js"></script>
</body>
</html>
