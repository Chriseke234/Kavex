<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join as a Buyer — Kavex B2B</title>
    <script src="/assets/js/env-inject.js"></script>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/auth-pages.css">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-light">

    <nav class="navbar" role="navigation" aria-label="Main Navigation">
        <div class="container nav-container">
            <a href="/" class="logo" aria-label="Kavex Home">
                <span>Kav</span><span>ex</span>
            </a>
            <div class="nav-actions">
                <a href="/login" class="fs-sm fw-bold">Sign In</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="wizard-container max-w-700">
            
            <div class="text-center mb-1">
                <h1 class="wizard-title">Create Buyer Account</h1>
                <p class="text-muted">Source quality products from verified Nigerian suppliers.</p>
            </div>

            <!-- Progress 3 steps -->
            <div class="progress-container">
                <div class="progress-bar-bg"></div>
                <div class="progress-bar-fill" id="progress-fill"></div>
                <div class="step-marker active" data-step="1">1</div>
                <div class="step-marker" data-step="2">2</div>
                <div class="step-marker" data-step="3">3</div>
            </div>

            <form id="wizard-form" onsubmit="event.preventDefault(); nextStep();">
                
                <!-- STEP 1: ACCOUNT -->
                <section class="wizard-step active" id="step-1">
                    <h2 class="mb-1">Step 1: Account Details</h2>
                    <div class="form-group">
                        <label for="full-name">Full Name</label>
                        <input type="text" id="full-name" name="full_name" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Business Email</label>
                        <input type="email" id="email" name="email" placeholder="john@buyercompany.com" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <div class="flex gap-0-5">
                            <select id="dial-code-select" name="dial_code" class="w-140" title="Country Dial Code" aria-label="Country Dial Code">
                                <!-- Populated by JS -->
                            </select>
                            <input type="tel" id="user_phone" name="phone" placeholder="8012345678" class="flex-1" required>
                        </div>
                    </div>
                    <div class="form-grid-2">
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" required>
                        </div class="form-group">
                        <div class="form-group">
                            <label for="confirm-password">Confirm Password</label>
                            <input type="password" id="confirm-password" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="country-select">Country of Business</label>
                        <select id="country-select" name="country" required>
                            <option value="">Select Country</option>
                        </select>
                    </div>
                </section>

                <!-- STEP 2: BUSINESS PROFILE -->
                <section class="wizard-step" id="step-2">
                    <h2 class="mb-1">Step 2: Sourcing Profile</h2>
                    <div class="form-group">
                        <label for="business-name">Company/Business Name</label>
                        <input type="text" id="business-name" name="business_name" required>
                    </div>
                    <div class="form-grid-2">
                        <div class="form-group">
                            <label for="industry">Industry</label>
                            <select id="industry" name="industry" required>
                                <option value="">Select Industry</option>
                                <option>Agriculture & Food</option>
                                <option>Textiles & Apparel</option>
                                <option>Industrial Hardware</option>
                                <option>Electronics</option>
                                <option>Chemicals</option>
                                <option>Construction</option>
                                <!-- Map more via JS if needed -->
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="budget">Annual Purchasing Budget</label>
                            <select id="budget" name="budget" required>
                                <option>Under $10k</option>
                                <option>$10k-$50k</option>
                                <option>$50k-$200k</option>
                                <option>$200k+</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Primary Sourcing Categories</label>
                        <div id="sourcing-categories-grid" class="checkbox-grid">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="website">Company Website (Optional)</label>
                        <input type="url" id="website" name="website" placeholder="https://example.com">
                    </div>
                    <div class="form-group">
                        <label for="source-referral">How did you hear about us?</label>
                        <select id="source-referral" name="source_referral">
                            <option>Social Media</option>
                            <option>Search Engine</option>
                            <option>Referral</option>
                            <option>Industry Event</option>
                            <option>Other</option>
                        </select>
                    </div>
                </section>

                <!-- STEP 3: PREFERENCES -->
                <section class="wizard-step" id="step-3">
                    <h2 class="mb-1">Step 3: Trade Preferences</h2>
                    
                    <div class="form-group">
                        <label>Preferred Payment Methods</label>
                        <div class="checkbox-grid">
                            <label class="checkbox-pill"><input type="checkbox" name="payment_methods" value="Bank Transfer"> <span>Bank Transfer</span></label>
                            <label class="checkbox-pill"><input type="checkbox" name="payment_methods" value="Card Payment"> <span>Card Payment</span></label>
                            <label class="checkbox-pill"><input type="checkbox" name="payment_methods" value="Wire Transfer"> <span>Wire Transfer</span></label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Preferred Shipping Methods</label>
                        <div class="checkbox-grid">
                            <label class="checkbox-pill"><input type="checkbox" name="shipping_methods" value="Air Freight"> <span>Air Freight</span></label>
                            <label class="checkbox-pill"><input type="checkbox" name="shipping_methods" value="Sea Freight"> <span>Sea Freight</span></label>
                            <label class="checkbox-pill"><input type="checkbox" name="shipping_methods" value="Road Transport"> <span>Road Transport</span></label>
                            <label class="checkbox-pill"><input type="checkbox" name="shipping_methods" value="Express Courier"> <span>Express Courier</span></label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Notification Toggles</label>
                        <div class="flex gap-1 flex-wrap">
                            <label class="flex items-center gap-1 fs-sm"><input type="checkbox" name="notify_email" checked> Email</label>
                            <label class="flex items-center gap-1 fs-sm"><input type="checkbox" name="notify_sms"> SMS</label>
                            <label class="flex items-center gap-1 fs-sm"><input type="checkbox" name="notify_whatsapp"> WhatsApp</label>
                        </div>
                    </div>

                    <div style="margin-top: 2rem;">
                        <label class="flex items-center gap-1">
                            <input type="checkbox" required>
                            <span class="fs-sm">I agree to the Kavex Terms of Service and Privacy Policy.</span>
                        </label>
                    </div>
                </section>

                <!-- Nav -->
                <div class="wizard-nav">
                    <button type="button" class="btn btn-ghost" onclick="prevStep()" id="back-btn" style="visibility:hidden">Back</button>
                    <button type="submit" class="btn btn-primary" id="next-btn">Continue</button>
                    <button type="button" class="btn btn-primary" id="submit-btn" style="display:none" onclick="submitBuyerWizard()">Complete Registration</button>
                </div>
            </form>

            <!-- Success -->
            <div id="success-screen" style="display:none; text-align: center; padding: 2rem;">
                <div style="font-size: 4rem; margin-bottom: 1rem;">💼</div>
                <h2 class="mb-1">Welcome to Kavex!</h2>
                <p class="text-muted mb-1">Start sourcing from verified Nigerian suppliers.</p>
                <div class="flex flex-col gap-1 mt-2">
                    <a href="/pages/marketplace/products.html" class="btn btn-primary">Browse Marketplace</a>
                    <a href="/rfq/new" class="btn btn-outline-navy">Submit Your First RFQ</a>
                </div>
            </div>

        </div>
    </div>

    <script src="../../assets/js/supabase-client.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/buyer-register.js"></script>
    <script>
        // Adjust button labels on step change
        const originalShowStep = window.showStep;
        window.showStep = function(n) {
            originalShowStep(n);
            const nextBtn = document.querySelector('#next-btn');
            const submitBtn = document.querySelector('#submit-btn');
            const backBtn = document.querySelector('#back-btn');

            if (n === 3) {
                nextBtn.style.display = 'none';
                submitBtn.style.display = 'block';
            } else {
                nextBtn.style.display = 'block';
                submitBtn.style.display = 'none';
            }

            if (n === 1) backBtn.style.visibility = 'hidden';
            else backBtn.style.visibility = 'visible';
        }
    </script>
</body>
</html>
