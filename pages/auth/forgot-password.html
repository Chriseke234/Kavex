<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/assets/js/env-inject.js"></script>
    <title>Forgot Password — Kavex B2B</title>
    <link rel="stylesheet" href="/assets/css/design-system.css">
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/auth-pages.css">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-light">

    <div class="container" style="max-width: 450px; padding-top: 10vh;">
        <div class="card p-3">
            <div class="text-center mb-2">
                <a href="/" class="logo"><span>Kav</span><span>ex</span></a>
                <h1 class="mt-2" style="font-size: 1.5rem;">Reset your password</h1>
                <p class="text-muted fs-sm">Enter your email and we'll send you a recovery link.</p>
            </div>

            <div id="recovery-status"></div>

            <form onsubmit="handleForgotPassword(event)">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" name="email" id="email" placeholder="ceo@company.com" required>
                </div>
                <button type="submit" class="btn-primary w-full mt-1">Send Reset Link</button>
            </form>

            <div class="text-center mt-2">
                <a href="/pages/auth/login.html" class="fs-sm fw-bold">Back to Sign In</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../../assets/js/supabase-client.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/recovery.js"></script>
</body>
</html>
